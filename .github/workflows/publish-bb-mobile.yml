name: Publish Barretenberg Mobile

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    # Allow pushing a manual nightly release
    inputs:
      ref_name:
        description: The ref name to build as. Useful for hotfixing a release.
        required: false
      tag:
        description: The tag to build from (leave empty to build a nightly release from master)
        required: false
      publish:
        description: Whether to publish the build artifacts
        type: boolean
        default: false
  # schedule:
  #   # Run a nightly release at 2 AM UTC
  #   - cron: "0 2 * * *"

permissions:
  # Necessary to upload new release artifacts
  contents: write
  issues: write

jobs:
  build-mobile:
    name: Build Mobile Targets (matrix)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # iOS targets - build C++ library directly
          - label: aarch64-apple-ios
            runner: macos-14
            platform: ios
            optional: false
          - label: aarch64-apple-ios-sim
            runner: macos-14
            platform: ios
            optional: false
          - label: x86_64-apple-ios
            runner: macos-13
            platform: ios
            optional: false
          # macOS desktop targets
          - label: aarch64-apple-darwin
            runner: macos-14
            platform: macos
            optional: false
          # Android targets
          - label: x86_64-linux-android
            runner: macos-14
            platform: android
            android_abi: x86_64
            optional: false
          - label: aarch64-linux-android
            runner: macos-14
            platform: android
            android_abi: arm64-v8a
            optional: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ inputs.tag || github.sha }}

      - name: Set up iOS Environment
        if: matrix.platform == 'ios'
        run: |
          # Install Rust for iOS cross-compilation
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add ${{ matrix.label }}
          echo "IPHONEOS_DEPLOYMENT_TARGET=15.0" >> $GITHUB_ENV

      - name: Set up Android Environment
        if: matrix.platform == 'android'
        run: |
          # Install Rust for Android cross-compilation
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add ${{ matrix.label }}
          # Install Android SDK and NDK via brew
          brew install --cask android-commandlinetools
          # Set Android environment variables
          echo "ANDROID_HOME=$HOME/Library/Android/sdk" >> $GITHUB_ENV
          echo "NDK_VERSION=26.1.10909125" >> $GITHUB_ENV
          # Create SDK directory and accept licenses
          mkdir -p $HOME/Library/Android/sdk
          yes | $HOME/Library/Android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Install NDK
          $HOME/Library/Android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          # Set HOST_TAG for Android NDK
          HOST_TAG=$(ls $HOME/Library/Android/sdk/ndk/26.1.10909125/toolchains/llvm/prebuilt)
          echo "HOST_TAG=$HOST_TAG" >> $GITHUB_ENV

      - name: Build Rust Library for iOS
        if: matrix.platform == 'ios'
        working-directory: barretenberg/bb_rs
        continue-on-error: ${{ matrix.optional }}
        run: |
          source $HOME/.cargo/env
          IPHONEOS_DEPLOYMENT_TARGET=15.0 cargo build -vvvv --target ${{ matrix.label }} --release

      - name: Build Rust Library for macOS
        if: matrix.platform == 'macos'
        working-directory: barretenberg/bb_rs
        continue-on-error: ${{ matrix.optional }}
        run: |
          source $HOME/.cargo/env
          cargo build -vvvv --target ${{ matrix.label }} --release

      - name: Build Rust Library for Android
        if: matrix.platform == 'android'
        working-directory: barretenberg/bb_rs
        continue-on-error: ${{ matrix.optional }}
        run: |
          source $HOME/.cargo/env
          HOST_TAG=$HOST_TAG ANDROID_HOME="$HOME/Library/Android/sdk" NDK_VERSION="26.1.10909125" cargo build -vvvv --target ${{ matrix.label }} --release

      - name: Package iOS Rust Library Artifact (${{ matrix.label }})
        if: matrix.platform == 'ios'
        working-directory: barretenberg/bb_rs
        continue-on-error: ${{ matrix.optional }}
        run: |
          mkdir -p dist/${{ matrix.label }}/lib
          # Find the build directory (it has a hash in the name)
          BUILD_DIR=$(find target/${{ matrix.label }}/release/build -name "bb_rs-*" -type d | head -1)

          # Copy the C++ static library (libbarretenberg.a) into lib directory
          cp $BUILD_DIR/out/build/lib/libbarretenberg.a ./dist/${{ matrix.label }}/lib/

          # Copy all header files from the include directory
          cp -r $BUILD_DIR/out/build/include ./dist/${{ matrix.label }}/

          # Create the tar.gz archive
          cd dist && 7z a -ttar -so -an ${{ matrix.label }} | 7z a -si ../bb_rs-${{ matrix.label }}.tar.gz

      - name: Package macOS Rust Library Artifact (${{ matrix.label }})
        if: matrix.platform == 'macos'
        working-directory: barretenberg/bb_rs
        continue-on-error: ${{ matrix.optional }}
        run: |
          mkdir -p dist/${{ matrix.label }}/lib
          # Find the build directory (it has a hash in the name)
          BUILD_DIR=$(find target/${{ matrix.label }}/release/build -name "bb_rs-*" -type d | head -1)

          # Copy the C++ static library (libbarretenberg.a) into lib directory
          cp $BUILD_DIR/out/build/lib/libbarretenberg.a ./dist/${{ matrix.label }}/lib/

          # Copy all header files from the include directory
          cp -r $BUILD_DIR/out/build/include ./dist/${{ matrix.label }}/

          # Create the tar.gz archive
          cd dist && 7z a -ttar -so -an ${{ matrix.label }} | 7z a -si ../bb_rs-${{ matrix.label }}.tar.gz

      - name: Package Android Rust Library Artifact (${{ matrix.label }})
        if: matrix.platform == 'android'
        working-directory: barretenberg/bb_rs
        continue-on-error: ${{ matrix.optional }}
        run: |
          mkdir -p dist/${{ matrix.label }}/lib
          # Find the build directory (it has a hash in the name)
          BUILD_DIR=$(find target/${{ matrix.label }}/release/build -name "bb_rs-*" -type d | head -1)

          # Copy the C++ static library (libbarretenberg.a) into lib directory
          cp $BUILD_DIR/out/build/lib/libbarretenberg.a ./dist/${{ matrix.label }}/lib/

          # Copy all header files from the include directory
          cp -r $BUILD_DIR/out/build/include ./dist/${{ matrix.label }}/

          # Create the tar.gz archive
          cd dist && 7z a -ttar -so -an ${{ matrix.label }} | 7z a -si ../bb_rs-${{ matrix.label }}.tar.gz

      - name: Upload Library Artifact (${{ matrix.label }})
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        continue-on-error: ${{ matrix.optional }}
        with:
          name: bb_rs-${{ matrix.label }}.tar.gz
          path: ./barretenberg/bb_rs/bb_rs-${{ matrix.label }}.tar.gz
          retention-days: 3

  build-check:
    name: Check builds are successful
    needs: build-mobile
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Report overall success
        env:
          FAIL: ${{ contains(needs.*.result, 'failure') }}
        run: |
          if [[ $FAIL == true ]]; then
              echo "At least one job failed, release is unsuccessful."
              exit 1
          else
              echo "All jobs succeeded, uploading artifacts to release."
              exit 0
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        if: ${{ failure() }}
        with:
          ref: ${{ inputs.tag || github.sha }}

      - name: Alert on build failure
        uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          update_existing: true
          filename: .github/RELEASE_FAILED.md

  release:
    name: Publish
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      # Download iOS artifacts
      - name: Download bb_rs artifact (aarch64-apple-ios)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bb_rs-aarch64-apple-ios.tar.gz

      - name: Download bb_rs artifact (aarch64-apple-ios-sim)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bb_rs-aarch64-apple-ios-sim.tar.gz

      - name: Download bb_rs artifact (x86_64-apple-ios)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bb_rs-x86_64-apple-ios.tar.gz

      # Download macOS artifacts
      - name: Download bb_rs artifact (aarch64-apple-darwin)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bb_rs-aarch64-apple-darwin.tar.gz

      # Download Android artifacts
      - name: Download bb_rs artifact (x86_64-linux-android)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bb_rs-x86_64-linux-android.tar.gz

      - name: Download bb_rs artifact (aarch64-linux-android)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bb_rs-aarch64-linux-android.tar.gz

      - name: Publish to GitHub
        uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        with:
          tag_name: ${{ inputs.ref_name || inputs.tag || github.ref_name }}
          prerelease: true
          files: |
            bb_rs-aarch64-apple-darwin.tar.gz
            bb_rs-aarch64-apple-ios-sim.tar.gz
            bb_rs-aarch64-apple-ios.tar.gz
            bb_rs-x86_64-apple-ios.tar.gz
            bb_rs-aarch64-linux-android.tar.gz
            bb_rs-x86_64-linux-android.tar.gz
