name: Build and Publish bb_rs Linux Binaries

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true
        default: 'ci/bb_rs-2.0.3'
      ref_name:
        description: 'The ref name to build as'
        required: false
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true
        type: string
      ref_name:
        description: 'The ref name to build as'
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag_name || github.sha }}
        submodules: recursive

    - name: Set up Linux Environment
      run: |
        # Install Rust stable for Linux compilation
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
        # Add cargo bin to PATH for subsequent steps
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        # Install the Linux target
        rustup target add ${{ matrix.target }}
        # Install ninja build system and cross-compilation tools
        sudo apt-get update && sudo apt-get install -y ninja-build

        # Install ARM64 cross-compilation toolchain if needed
        if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        fi

    - name: Build Rust Library for Linux
      working-directory: barretenberg/bb_rs
      env:
        CARGO_BUILD_JOBS: 2
        # Reduce memory usage during compilation
        CARGO_NET_RETRY: 3
        # Enable swap to handle memory pressure
        RUSTFLAGS: "-C codegen-units=1"
      run: |
        # Free up memory and enable swap if needed
        sudo swapoff -a || true
        sudo swapon -a || true
        # Check available memory
        free -h
        cargo build -vvvv --target ${{ matrix.target }} --release

    - name: Package Linux Rust Library Artifact
      working-directory: barretenberg/bb_rs
      run: |
        mkdir -p dist/${{ matrix.target }}/lib
        # Find the build directory (it has a hash in the name)
        BUILD_DIR=$(find target/${{ matrix.target }}/release/build -name "bb_rs-*" -type d | head -1)

        # Copy the C++ static library (libbarretenberg.a) into lib directory
        cp $BUILD_DIR/out/build/lib/libbarretenberg.a ./dist/${{ matrix.target }}/lib/

        # Copy libdeflate if it exists
        if [ -f "$BUILD_DIR/out/build/lib/libdeflate.a" ]; then
          cp $BUILD_DIR/out/build/lib/libdeflate.a ./dist/${{ matrix.target }}/lib/
        elif [ -f "$BUILD_DIR/out/build/_deps/libdeflate-build/libdeflate.a" ]; then
          cp $BUILD_DIR/out/build/_deps/libdeflate-build/libdeflate.a ./dist/${{ matrix.target }}/lib/
        fi

        # Copy all header files from the include directory
        cp -r $BUILD_DIR/out/build/include ./dist/${{ matrix.target }}/

        # Create the tar.gz archive
        cd dist && tar -czf ../bb_rs-${{ matrix.target }}.tar.gz ${{ matrix.target }}

        # Verify the contents
        echo "Contents of bb_rs-${{ matrix.target }}.tar.gz:"
        tar -tzf ../bb_rs-${{ matrix.target }}.tar.gz

    - name: Upload Library Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bb_rs-${{ matrix.target }}.tar.gz
        path: ./barretenberg/bb_rs/bb_rs-${{ matrix.target }}.tar.gz
        retention-days: 3
